<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>趣味科学大抽奖</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入可爱的字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Varela+Round&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="leaderboard.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'scifi-bg': '#1a1a2e',
                        'scifi-card': '#16213e',
                        'scifi-accent': '#0f3460',
                        'neon-pink': '#ff2e63',
                        'neon-cyan': '#08d9d6',
                        'neon-yellow': '#ffde7d',
                        'space-purple': '#6c5ce7',
                    },
                    fontFamily: {
                        'cute': ['"Fredoka One"', 'cursive'],
                        'body': ['"Varela Round"', 'sans-serif'],
                    },
                    boxShadow: {
                        'pop': '0 10px 0px rgba(0,0,0,0.2)',
                        'pop-active': '0 5px 0px rgba(0,0,0,0.2)',
                        'glow': '0 0 15px currentColor',
                    },
                    animation: {
                        'float': 'float 3s ease-in-out infinite',
                        'twinkle': 'twinkle 4s ease-in-out infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        },
                        twinkle: {
                            '0%, 100%': { opacity: '0.5', transform: 'scale(1)' },
                            '50%': { opacity: '1', transform: 'scale(1.2)' },
                        }
                    }
                }
            }
        }
    </script>

    <!-- Firebase SDK for Cloud Sync -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>

<body
    class="bg-scifi-bg text-gray-900 min-h-screen flex flex-col items-center justify-start pt-2 overflow-hidden font-body selection:bg-neon-pink selection:text-white">

    <!-- 动态星空背景 -->
    <div class="stars absolute inset-0 pointer-events-none"></div>
    <div class="planets absolute inset-0 pointer-events-none overflow-hidden">
        <div class="absolute top-10 left-10 text-6xl opacity-20 animate-float text-space-purple">🪐</div>
        <div class="absolute bottom-20 right-20 text-8xl opacity-20 animate-float text-neon-cyan"
            style="animation-delay: 1.5s;">🚀</div>
        <div class="absolute top-1/2 left-20 text-4xl opacity-20 animate-pulse text-neon-yellow">⭐</div>
        <div class="absolute top-20 right-1/3 text-5xl opacity-10 animate-spin-slow text-white">⚙️</div>
    </div>

    <!-- 生物背景层 -->
    <div class="bio-bg">
        <!-- Paramecium 1 -->
        <svg class="bio-item animate-swim" style="top: 10%; left: 10%; width: 100px; animation-duration: 25s;"
            viewBox="0 0 100 60" fill="none" stroke="#22d3ee" stroke-width="2">
            <path d="M10,30 Q20,5 50,10 T90,30 T50,50 T10,30 Z" fill="rgba(34, 211, 238, 0.1)" />
            <circle cx="30" cy="30" r="3" fill="#22d3ee" opacity="0.5" />
            <path d="M10,30 L5,28 M15,25 L12,20 M50,10 L50,5" stroke="rgba(34, 211, 238, 0.3)" />
        </svg>

        <!-- Paramecium 2 -->
        <svg class="bio-item animate-swim"
            style="bottom: 20%; right: 15%; width: 120px; animation-duration: 30s; animation-delay: 5s;"
            viewBox="0 0 100 60" fill="none" stroke="#e879f9" stroke-width="2">
            <path d="M10,30 Q30,10 60,15 T90,30 T60,45 T10,30 Z" fill="rgba(232, 121, 249, 0.1)" />
            <circle cx="70" cy="30" r="4" fill="#e879f9" opacity="0.5" />
        </svg>

        <!-- Bubbles -->
        <div class="bio-item animate-bubble absolute rounded-full bg-white/10 w-4 h-4" style="left: 20%; bottom: -10%;">
        </div>
        <div class="bio-item animate-bubble absolute rounded-full bg-white/10 w-8 h-8"
            style="left: 50%; bottom: -10%; animation-delay: 2s;"></div>
        <div class="bio-item animate-bubble absolute rounded-full bg-white/10 w-6 h-6"
            style="left: 80%; bottom: -10%; animation-delay: 4s;"></div>
    </div>

    <!-- 主容器 -->
    <main
        class="relative z-10 w-full max-w-[98vw] h-screen p-4 flex flex-col md:flex-row items-start justify-center gap-4">

        <!-- 左侧标题区域 -->
        <header
            class="md:w-1/5 flex flex-col items-center md:items-start justify-center md:justify-start pt-10 md:pl-8 space-y-6">
            <h1
                class="text-4xl md:text-5xl font-cute text-transparent bg-clip-text bg-gradient-to-br from-neon-cyan via-white to-neon-pink drop-shadow-md text-center md:text-left leading-tight">
                科学课堂<br>大抽奖
            </h1>
            <button id="perf-mode-btn" onclick="togglePerfMode()"
                class="text-sm font-bold px-5 py-2 rounded-full border border-white/30 shadow-lg transform hover:scale-105 transition-all text-center bg-white/10 text-neon-cyan hover:bg-white/20">
                ⚡ 流畅模式
            </button>

            <!-- 排行榜入口 -->
            <button onclick="toggleLeaderboard()" class="leaderboard-trigger-btn">
                <span>🏆</span> 累积积分排行榜
            </button>

            <!-- 群体加分按钮 -->
            <button onclick="showGroupBonusModal()" class="group-bonus-trigger-btn">
                <span>⭐</span> 群体加分
            </button>

            <!-- 科学老师百宝袋 -->
            <div id="scientist-treasure" class="scientist-treasure-box">
                <div class="scientist-avatar-wrapper">
                    <img src="scientist.png" alt="科学老师" class="scientist-avatar" />
                    <div class="scientist-sparkles">
                        <span class="sparkle s1">✨</span>
                        <span class="sparkle s2">⭐</span>
                        <span class="sparkle s3">🔬</span>
                    </div>
                </div>
                <div class="scientist-name">🧪 科学老师的百宝袋</div>
                <div class="treasure-bar-container">
                    <div class="treasure-bar-bg">
                        <div id="treasure-bar-fill" class="treasure-bar-fill" style="width: 100%"></div>
                        <div class="treasure-bar-shine"></div>
                    </div>
                </div>
                <div class="treasure-score-display">
                    <span class="treasure-label">剩余积分</span>
                    <span id="treasure-score-value" class="treasure-score-number">9999</span>
                </div>
            </div>
        </header>

        <!-- 右侧游戏区域容器 -->
        <div class="flex-1 w-full h-full flex flex-col items-center justify-start pt-2">
            <div
                class="relative w-full max-w-6xl aspect-[16/9] bg-white/20 rounded-3xl border-4 border-white/40 shadow-2xl backdrop-blur-md p-2 flex items-center justify-center transform scale-95 origin-top">

                <!-- 格子轨道容器 -->
                <div id="slots-container" class="absolute inset-2 md:inset-6">
                    <!-- 格子将通过 JS 动态生成 -->
                </div>

                <!-- 中央控制台 -->
                <div
                    class="relative z-20 flex flex-col items-center justify-center bg-black/40 w-72 h-auto py-6 rounded-2xl border border-white/30 backdrop-blur-xl shadow-glow text-center p-4">

                    <!-- 状态显示 -->
                    <div class="mb-3 w-full">
                        <div id="status-text" class="text-xl font-cute text-white animate-pulse">准备就绪</div>
                        <!-- 进度条 -->
                        <div class="mt-3 h-3 w-full bg-black/50 rounded-full overflow-hidden border border-white/20">
                            <div id="loading-bar"
                                class="h-full bg-gradient-to-r from-neon-pink to-neon-yellow w-0 transition-all duration-300">
                            </div>
                        </div>
                    </div>

                    <!-- 按钮组 -->
                    <div class="relative w-full flex flex-col items-center justify-center gap-4 mt-2">
                        <div class="relative group">
                            <button id="start-btn"
                                class="w-48 px-8 py-3 bg-gradient-to-b from-blue-400 to-blue-600 rounded-xl shadow-pop transform transition-all active:shadow-pop-active active:translate-y-[5px] hover:brightness-110 z-10 relative">
                                <span
                                    class="font-cute text-xl text-white drop-shadow-md flex items-center justify-center gap-2">
                                    <span>🚀</span> 启动引擎
                                </span>
                            </button>
                        </div>

                        <div class="flex items-center gap-2">
                            <button id="select-student-btn" onclick="openStudentModal()"
                                class="bg-space-purple hover:bg-purple-600 text-white px-6 py-2 rounded-full font-bold shadow-lg border-2 border-purple-400 transition-transform hover:scale-105 flex items-center gap-2 text-sm">
                                <span>👤</span> <span id="current-student-name">选择学生</span>
                            </button>
                            <div id="current-student-score"
                                class="hidden items-center gap-1 bg-white/15 border border-white/30 text-white px-3 py-1.5 rounded-full text-sm font-bold backdrop-blur-sm">
                                <span id="current-student-score-icon">⭐</span>
                                <span id="current-student-score-value">0</span>
                                <span class="text-white/70 text-xs">分</span>
                            </div>
                        </div>
                    </div>

                </div>

            </div>
        </div>

    </main>

    <!-- 排行榜侧边栏 (现在在左侧) -->
    <div id="leaderboard-sidebar">
        <!-- Close Button for Mobile/Overlay -->
        <button onclick="toggleLeaderboard()"
            class="absolute top-4 right-4 text-gray-400 hover:text-white bg-gray-200 hover:bg-red-400 rounded-full w-8 h-8 flex items-center justify-center transition-colors z-50">
            ❌
        </button>

        <div class="flex items-center justify-center gap-4 mt-0 mb-1 relative shrink-0">
            <h2 class="text-2xl font-cute text-neon-cyan mb-0">🏆 累积积分排行榜</h2>
            <button id="lb-toggle-view" onclick="toggleLeaderboardView()"
                class="px-6 py-2 rounded-full text-2xl font-cute bg-neon-cyan text-white shadow-lg hover:bg-cyan-400 transition-colors">
                显示全体
            </button>
        </div>

        <div id="leaderboard-list" class="flex-1 overflow-y-auto pr-2 custom-scrollbar">
            <!-- 列表项将通过 JS 生成 -->
            <div class="text-center text-gray-400 mt-10">暂无数据<br>请先导入CSV</div>
        </div>

        <!-- Scroll Controls -->
        <div class="absolute -right-16 top-1/2 transform -translate-y-1/2 flex flex-col gap-4 z-50">
            <button onmousedown="startScrolling(-1)" onmouseup="stopScrolling()" onmouseleave="stopScrolling()"
                class="w-12 h-12 rounded-full bg-white text-neon-cyan text-2xl font-bold shadow-lg border-2 border-neon-cyan hover:scale-110 active:scale-95 transition-all flex items-center justify-center">
                ▲
            </button>
            <button onmousedown="startScrolling(1)" onmouseup="stopScrolling()" onmouseleave="stopScrolling()"
                class="w-12 h-12 rounded-full bg-white text-neon-cyan text-2xl font-bold shadow-lg border-2 border-neon-cyan hover:scale-110 active:scale-95 transition-all flex items-center justify-center">
                ▼
            </button>
        </div>
    </div>

    <!-- 学生选择 Modal -->
    <div id="student-modal"
        class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm hidden">
        <div
            class="bg-white border-4 border-yellow-400 p-4 md:p-6 rounded-3xl w-full max-w-4xl shadow-[0_10px_0_rgba(250,204,21,1)] relative animate-float">

            <!-- Close Button -->
            <button onclick="closeStudentModal()"
                class="absolute top-4 right-4 text-gray-400 hover:text-red-500 text-3xl font-black w-10 h-10 flex items-center justify-center bg-gray-100 rounded-full z-50 transition-colors">&times;</button>

            <!-- Back Button Container (injected via JS if needed, but styling hook here) -->
            <div id="modal-back-button-container" class="absolute top-4 right-16 z-50"></div>

            <h2 class="text-2xl md:text-3xl font-cute text-yellow-600 mb-4 mt-2 text-center drop-shadow-sm">选择幸运儿 🎯
            </h2>

            <div id="student-grid"
                class="student-grid custom-scrollbar h-[60vh] min-h-[450px] border-2 border-yellow-200 rounded-2xl bg-yellow-50 p-3 md:p-4 grid grid-cols-5 sm:grid-cols-6 md:grid-cols-8 gap-2 overflow-y-auto">
                <!-- 学生按钮 -->
            </div>

            <div class="mt-4 flex justify-center">
                <button onclick="confirmStudentSelection()"
                    class="px-8 py-2 bg-yellow-400 text-yellow-900 font-bold text-lg rounded-full shadow-[0_4px_0_rgba(202,138,4,1)] hover:bg-yellow-300 active:translate-y-[4px] active:shadow-none transition-all">
                    确认选择
                </button>
            </div>
        </div>
    </div>

    <!-- 奖品提示框 Modal -->
    <div id="prize-modal"
        class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm hidden opacity-0 transition-opacity duration-300">
        <div
            class="bg-gradient-to-br from-white to-blue-50 border-4 border-neon-cyan p-8 rounded-3xl shadow-[0_0_50px_rgba(8,217,214,0.5)] transform scale-90 transition-transform duration-300 flex flex-col items-center max-w-sm w-full relative">

            <!-- Close Button -->
            <button onclick="closeModal()"
                class="absolute top-4 right-4 text-gray-400 hover:text-red-500 text-2xl font-bold">&times;</button>

            <div class="text-6xl mb-4 animate-bounce" id="modal-icon">🎁</div>
            <h2 class="text-3xl font-cute text-scifi-accent mb-2">恭喜获得</h2>
            <div class="text-4xl font-black text-neon-pink mb-4" id="modal-text">神秘大奖</div>

            <!-- 累积积分显示区域 -->
            <div id="modal-total-score" class="hidden w-full mb-4 text-center">
                <div
                    class="bg-gradient-to-r from-blue-100 to-cyan-100 border-2 border-cyan-300 rounded-2xl px-4 py-3 shadow-md">
                    <div id="modal-total-score-text" class="text-base font-bold text-scifi-accent"></div>
                    <!-- 突破100倍数特效提示 -->
                    <div id="modal-milestone-badge"
                        class="hidden mt-2 text-lg font-black text-white bg-gradient-to-r from-orange-400 via-pink-500 to-purple-500 px-4 py-1.5 rounded-full shadow-lg animate-bounce">
                    </div>
                </div>
            </div>

            <button onclick="closeModal()"
                class="px-8 py-2 bg-neon-cyan hover:bg-cyan-400 text-white font-bold rounded-full shadow-lg transition-transform hover:scale-105">
                收入囊中
            </button>
        </div>
    </div>

    <!-- 群体加分 - 选择类型 Modal -->
    <div id="group-bonus-modal"
        class="fixed inset-0 z-[1100] flex items-center justify-center bg-black/50 backdrop-blur-sm hidden">
        <div
            class="bg-white border-4 border-purple-400 p-8 rounded-3xl w-full max-w-md shadow-[0_10px_0_rgba(147,51,234,0.7)] relative animate-float">
            <button onclick="closeGroupBonusModal()"
                class="absolute top-4 right-4 text-gray-400 hover:text-red-500 text-3xl font-black w-10 h-10 flex items-center justify-center bg-gray-100 rounded-full z-50 transition-colors">&times;</button>
            <h2 class="text-2xl font-cute text-purple-600 mb-6 text-center">⭐ 群体加分</h2>
            <div class="flex flex-col gap-4">
                <button onclick="showGroupClassBonus()" class="group-bonus-type-btn group-bonus-class-btn">
                    <span class="text-4xl">🏫</span>
                    <div class="flex flex-col items-start">
                        <span class="text-lg font-black">班级集体加分</span>
                        <span class="text-sm text-gray-500">选择班级，全班每人 +10 分</span>
                    </div>
                </button>
                <button onclick="showGroupIndividualBonus()" class="group-bonus-type-btn group-bonus-individual-btn">
                    <span class="text-4xl">👥</span>
                    <div class="flex flex-col items-start">
                        <span class="text-lg font-black">班级个人加分</span>
                        <span class="text-sm text-gray-500">选择学生，自选分数加分</span>
                    </div>
                </button>
            </div>
        </div>
    </div>

    <!-- 全班奖励 - 班级选择 Modal (reused for 班级集体加分) -->
    <div id="class-bonus-modal"
        class="fixed inset-0 z-[1200] flex items-center justify-center bg-black/50 backdrop-blur-sm hidden">
        <div
            class="bg-white border-4 border-orange-400 p-6 rounded-3xl w-full max-w-md shadow-[0_10px_0_rgba(251,146,60,1)] relative animate-float">
            <button onclick="closeClassBonusModal()"
                class="absolute top-4 right-4 text-gray-400 hover:text-red-500 text-3xl font-black w-10 h-10 flex items-center justify-center bg-gray-100 rounded-full z-50 transition-colors">&times;</button>
            <h2 id="class-bonus-modal-title" class="text-2xl font-cute text-orange-600 mb-4 text-center">🎉 选择要奖励的班级
            </h2>
            <div id="class-bonus-grid" class="grid grid-cols-2 gap-3 p-2">
                <!-- 班级按钮由 JS 生成 -->
            </div>
        </div>
    </div>

    <!-- 班级个人加分 - 学生选择 Modal -->
    <div id="individual-bonus-modal"
        class="fixed inset-0 z-[1200] flex items-center justify-center bg-black/50 backdrop-blur-sm hidden">
        <div
            class="bg-white border-4 border-green-400 p-4 md:p-6 rounded-3xl w-full max-w-4xl shadow-[0_10px_0_rgba(34,197,94,0.7)] relative animate-float">
            <button onclick="closeIndividualBonusModal()"
                class="absolute top-4 right-4 text-gray-400 hover:text-red-500 text-3xl font-black w-10 h-10 flex items-center justify-center bg-gray-100 rounded-full z-50 transition-colors">&times;</button>
            <div id="individual-bonus-back-container" class="absolute top-4 right-16 z-50"></div>
            <h2 id="individual-bonus-title" class="text-2xl font-cute text-green-600 mb-4 text-center">👥 班级个人加分</h2>
            <div id="individual-bonus-grid"
                class="custom-scrollbar h-[55vh] min-h-[400px] border-2 border-green-200 rounded-2xl bg-green-50 p-3 md:p-4 grid grid-cols-5 sm:grid-cols-6 md:grid-cols-8 gap-2 overflow-y-auto">
                <!-- 学生按钮由 JS 生成 -->
            </div>
            <div class="mt-4 flex flex-col items-center justify-center gap-3">
                <div class="flex items-center gap-3 flex-wrap justify-center">
                    <span class="text-sm font-bold text-green-700">每人加分：</span>
                    <div id="individual-bonus-points-selector" class="flex items-center gap-2">
                        <button onclick="setIndividualBonusPoints(10)" class="bonus-points-btn selected" data-points="10">+10</button>
                        <button onclick="setIndividualBonusPoints(20)" class="bonus-points-btn" data-points="20">+20</button>
                        <button onclick="setIndividualBonusPoints(30)" class="bonus-points-btn" data-points="30">+30</button>
                        <button onclick="setIndividualBonusPoints(40)" class="bonus-points-btn" data-points="40">+40</button>
                        <button onclick="setIndividualBonusPoints(50)" class="bonus-points-btn" data-points="50">+50</button>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <div id="individual-bonus-count" class="text-lg font-bold text-green-700">已选 0 人</div>
                    <button onclick="confirmIndividualBonus()"
                        class="px-8 py-2.5 bg-gradient-to-r from-green-400 to-emerald-500 text-white font-bold text-lg rounded-full shadow-[0_4px_0_rgba(5,150,105,1)] hover:from-green-300 hover:to-emerald-400 active:translate-y-[4px] active:shadow-none transition-all flex items-center gap-2">
                        <span>✅</span> <span id="individual-bonus-confirm-text">确认加分 (+10分/人)</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 积分雨全屏覆盖层 -->
    <div id="coin-rain-overlay" class="fixed inset-0 z-[100] pointer-events-none hidden">
        <div id="coin-rain-text" class="absolute inset-0 flex flex-col items-center justify-center z-10">
            <div id="coin-rain-title"
                class="text-6xl font-cute text-white drop-shadow-[0_4px_20px_rgba(255,200,0,0.8)] opacity-0">全班 +10 分！
            </div>
            <div id="coin-rain-class" class="text-3xl font-bold text-yellow-200 mt-4 opacity-0"></div>
        </div>
        <div id="coin-rain-container" class="absolute inset-0 overflow-hidden"></div>
    </div>

    <script src="scores-data.js"></script>
    <script src="firebase-sync.js"></script>
    <script src="script.js"></script>
</body>

</html>
